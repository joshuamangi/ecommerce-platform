# configure services
services:
  catalogue-api:
    build: .
    container_name: catalogue_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      ENV_FILE: .env.docker
    depends_on:
      - db
      - cache
    command: >
      sh -c "
      python -m scripts.redis_health_check &&
      python -m scripts.wait_for_db &&
      alembic upgrade head &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    restart: on-failure

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data


volumes:
  pgdata:
  redis_data: