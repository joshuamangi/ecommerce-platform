services:
  catalogue-api:
    build:
      context: ./services/catalogue
    working_dir: /app/services/catalogue
    environment: #added because of separating local and docker
      - ENV_FILE=.env.docker
    expose:
      - "8000"
    volumes:
      - .:/app
    depends_on:
      - catalogue-db
      - catalogue-migration
      - cache
    command: >
      sh -c "
      python -m scripts.redis_health_check &&
      python -m scripts.wait_for_db &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
  
  order-api:
    build:
      context: ./services/order
    working_dir: /app/services/order
    env_file:
      - ./services/order/.env.docker
    expose:
      - "8010"
    volumes:
      - .:/app
    depends_on:
      - order-db
      - order-migration
      - cache
    command: >
      sh -c "
      uv run python -m scripts.redis_health_check &&
      uv run python -m scripts.wait_for_db &&
      uv run python -m uvicorn main:app --host 0.0.0.0 --port 8010"

  auth-api:
    build:
      context: ./services/auth
    working_dir: /app/services/auth
    environment:
      PYTHONPATH: /app
    env_file:
      - ./services/auth/.env.docker
    expose:
      - "8020"
    volumes:
      - .:/app
    depends_on:
      - auth-db
      - auth-migration
    command: >
      sh -c "
      uv run python -m scripts.wait_for_db &&
      uv run python -m uvicorn main:app --host 0.0.0.0 --port 8020"

  
  catalogue-db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./services/catalogue/.env.docker
    volumes:
      - pgdata_catalogue:/var/lib/postgresql/data

  order-db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    env_file:
      - ./services/order/.env.docker
    volumes:
      - pgdata_order:/var/lib/postgresql/data

  auth-db:
    image: postgres:15-alpine
    ports:
      - "5434:5432"
    env_file:
      - ./services/auth/.env.docker
    volumes:
      - pgdata_auth:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  catalogue-migration:
    build:
      context: ./services/catalogue
    working_dir: /app/services/catalogue
    volumes:
      - .:/app
    environment:
      - ENV_FILE=.env.docker
    depends_on:
      - catalogue-db
    command: >
      sh -c "
      python -m scripts.wait_for_db &&
      alembic upgrade head"
  
  order-migration:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    working_dir: /app/services/order
    volumes:
      - .:/app
    environment:
      - ENV_FILE=.env.docker
    depends_on:
      - order-db
    command: >
      sh -c "
      uv run python -m scripts.wait_for_db &&
      uv run alembic upgrade head"
    
  auth-migration:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    working_dir: /app/services/auth
    volumes:
      - .:/app
    environment:
      - ENV_FILE=.env.docker
    depends_on:
      - auth-db
    command: >
      sh -c "
      uv run python -m scripts.wait_for_db &&
      uv run alembic upgrade head"

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - catalogue-api
  
volumes:
  pgdata_auth:
  pgdata_catalogue:
  pgdata_order:
  redis_data: