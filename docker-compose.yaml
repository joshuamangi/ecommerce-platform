services:
  catalogue-api:
    build:
      context: ./services/catalogue
    working_dir: /app/services/catalogue
    environment: #added because of separating local and docker
      - ENV_FILE=.env.docker
      - PYTHONPATH=/app
    expose:
      - "8000"
    volumes:
      - .:/app
    depends_on:
      - catalogue-db
      - catalogue-migration
      - cache
    command: >
      sh -c "
      uv run python -m scripts.redis_health_check &&
      uv run python -m scripts.wait_for_db &&
      uv run python -m uvicorn main:app --host 0.0.0.0 --port 8000"
  
  order-api:
    build:
      context: ./services/order
    working_dir: /app/services/order
    environment:
      - ENV_FILE=.env.docker
      - PYTHONPATH=/app
    expose:
      - "8010"
    volumes:
      - .:/app
    depends_on:
      - order-db
      - order-migration
      - cache
    command: >
      sh -c "
      uv run python -m scripts.redis_health_check &&
      uv run python -m scripts.wait_for_db &&
      uv run python -m uvicorn main:app --host 0.0.0.0 --port 8010"

  auth-api:
    build:
      context: ./services/auth
    working_dir: /app/services/auth
    environment:
      - ENV_FILE=.env.docker
      - PYTHONPATH=/app
    expose:
      - "8020"
    volumes:
      - .:/app
    depends_on:
      - auth-db
      - auth-migration
    command: >
      sh -c "
      uv run python -m scripts.wait_for_db &&
      uv run python -m uvicorn main:app --host 0.0.0.0 --port 8020"

  
  catalogue-db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./services/catalogue/.env.docker
    volumes:
      - pgdata_catalogue:/var/lib/postgresql/data

  order-db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    env_file:
      - ./services/order/.env.docker
    volumes:
      - pgdata_order:/var/lib/postgresql/data

  auth-db:
    image: postgres:15-alpine
    ports:
      - "5434:5432"
    env_file:
      - ./services/auth/.env.docker
    volumes:
      - pgdata_auth:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  catalogue-migration:
    build:
      context: ./services/catalogue
    working_dir: /app/services/catalogue
    volumes:
      - .:/app
    environment:
      - ENV_FILE=.env.docker
    depends_on:
      - catalogue-db
    command: >
      sh -c "
      uv run python -m scripts.wait_for_db &&
      uv run alembic upgrade head"
  
  order-migration:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    working_dir: /app/services/order
    volumes:
      - .:/app
    environment:
      - ENV_FILE=.env.docker
    depends_on:
      - order-db
    command: >
      sh -c "
      uv run python -m scripts.wait_for_db &&
      uv run alembic upgrade head"
    
  auth-migration:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    working_dir: /app/services/auth
    volumes:
      - .:/app
    environment:
      - ENV_FILE=.env.docker
    depends_on:
      - auth-db
    command: >
      sh -c "
      uv run python -m scripts.wait_for_db &&
      uv run alembic upgrade head"

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - catalogue-api
      - order-api
      - auth-api
  
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - ./services/auth/.env.docker
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - catalogue-api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
  
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki



volumes:
  pgdata_auth:
  pgdata_catalogue:
  pgdata_order:
  redis_data:
  rabbitmq_data:
  grafana_data: